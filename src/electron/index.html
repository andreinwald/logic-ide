<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Viewer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <button id="open-folder-btn">Open Folder</button>
      <div id="root-path">No folder opened</div>
    </header>

    <main class="layout">
      <section class="sidebar">
        <section class="sidebar-panel recent-panel">
          <h2>Recent Files</h2>
          <div id="recent-files"></div>
        </section>

        <div class="resizer resizer-row" id="resizer-panels"></div>

        <section class="sidebar-panel tree-panel">
          <h2>Explorer</h2>
          <div id="tree"></div>
        </section>
      </section>

      <div class="resizer resizer-col" id="resizer-sidebar"></div>

      <section class="explanation-pane">
        <div id="tab-bar"></div>
        <div id="explanation-content"></div>
      </section>
    </main>

    <script type="module" src="./renderer.js"></script>
  </body>
</html>
