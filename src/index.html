<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Viewer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <button id="open-folder-btn">Open Folder</button>
      <div id="root-path">No folder opened</div>
    </header>

    <main class="layout">
      <section class="sidebar">
        <h2>Explorer</h2>
        <div id="tree"></div>
      </section>

      <section class="editor-pane">
        <div id="editor-file-path">Select a file from the tree</div>
        <pre id="editor-content"></pre>
      </section>
    </main>

    <script type="module" src="./renderer.js"></script>
  </body>
</html>
